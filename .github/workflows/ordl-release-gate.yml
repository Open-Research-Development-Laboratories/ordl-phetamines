name: ORDL Release Gate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            ordl_platform/frontend/package-lock.json

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "ordl_platform/backend[dev]"
          python -m pip install -r fleet_api/requirements.txt

      - name: Backend tests
        run: python -m pytest -q
        working-directory: ordl_platform/backend

      - name: Fleet tests
        run: python -m pytest -q fleet_api/tests

      - name: Frontend build
        run: |
          npm ci
          npm run build
        working-directory: ordl_platform/frontend
