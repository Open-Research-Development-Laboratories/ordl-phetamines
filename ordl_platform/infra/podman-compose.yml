services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ordl
      POSTGRES_PASSWORD: ordl
      POSTGRES_DB: ordl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ordlminio
      MINIO_ROOT_PASSWORD: ordlminio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: ..
      dockerfile: ordl_platform/infra/Dockerfile.backend
    environment:
      ORDL_DATABASE_URL: postgresql+psycopg://ordl:ordl@postgres:5432/ordl
      ORDL_POLICY_SECRET: ordl-dev-policy-secret-please-change-this-32b
      ORDL_AUTH_SECRET: ordl-dev-auth-secret-please-change-this-32b
      ORDL_EXTENSION_SIGNING_SECRET: ordl-dev-extension-secret-please-change-this-32b
      ORDL_STORAGE_BACKEND: s3
      ORDL_STORAGE_BUCKET: ordl-artifacts
    depends_on:
      - postgres
      - valkey
      - minio
    ports:
      - "8891:8891"

  worker:
    build:
      context: ..
      dockerfile: ordl_platform/infra/Dockerfile.backend
    command: ["python", "-m", "app.worker"]
    environment:
      ORDL_DATABASE_URL: postgresql+psycopg://ordl:ordl@postgres:5432/ordl
      ORDL_POLICY_SECRET: ordl-dev-policy-secret-please-change-this-32b
      ORDL_AUTH_SECRET: ordl-dev-auth-secret-please-change-this-32b
      ORDL_EXTENSION_SIGNING_SECRET: ordl-dev-extension-secret-please-change-this-32b
    depends_on:
      - backend

  frontend:
    build:
      context: ..
      dockerfile: ordl_platform/infra/Dockerfile.frontend
    environment:
      VITE_ORDL_API_BASE: http://localhost:8891/v1
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  minio_data:
