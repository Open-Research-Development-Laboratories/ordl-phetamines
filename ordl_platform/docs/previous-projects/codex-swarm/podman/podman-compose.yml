# =============================================================================
# ORDL COMMAND POST v6.0.0 - PODMAN COMPOSE
# =============================================================================
# Classification: TOP SECRET//SCI//NOFORN
# Purpose: Full stack deployment with Podman
# =============================================================================
# Usage: podman-compose up -d
# =============================================================================

version: '3.8'

services:
  # OLLAMA - LLM Inference Server
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ordl-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - ordl-network
    restart: unless-stopped
    # Podman-specific: run rootless
    userns_mode: keep-id

  # ROUTER - AI Request Router
  router:
    build:
      context: ..
      dockerfile: podman/Containerfile.router
    container_name: ordl-router
    ports:
      - "18000:18000"
    environment:
      - ROUTER_BIND=0.0.0.0
      - ROUTER_PORT=18000
      - OLLAMA_BASE=http://ollama:11434
      - ROUTER_MODE=max_quality
      - RATE_LIMIT_RPS=10
    depends_on:
      - ollama
    networks:
      - ordl-network
    restart: unless-stopped
    # Podman-specific
    userns_mode: keep-id

  # COMMAND POST - Main Application
  command-post:
    build:
      context: ..
      dockerfile: podman/Containerfile.command-post
    container_name: ordl-command-post
    ports:
      - "18010:18010"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me}
      - NEXUS_TOKEN=${NEXUS_TOKEN:-test-token}
      - DATA_DIR=/opt/ordl/data
      - ROUTER_URL=http://router:18000
    volumes:
      - ordl-data:/opt/ordl/data
    depends_on:
      - router
    networks:
      - ordl-network
    restart: unless-stopped
    # Podman-specific
    userns_mode: keep-id

volumes:
  ollama-models:
  ordl-data:

networks:
  ordl-network:
    driver: bridge
