<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPREME IDE - Professional AI Coding</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
        }
        
        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #58a6ff;
            border-bottom: 1px solid #30363d;
        }
        
        .nav-section {
            padding: 10px;
        }
        
        .nav-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #8b949e;
            padding: 10px;
            letter-spacing: 1px;
        }
        
        .nav-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-item:hover { background: #1f242c; }
        .nav-item.active { background: #1f6feb; }
        
        .project-list {
            flex: 1;
            overflow-y: auto;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Toolbar */
        .toolbar {
            height: 50px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }
        
        .toolbar button {
            background: #238636;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }
        
        .toolbar button:hover { background: #2ea043; }
        
        .model-select {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
        }
        
        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .code-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            height: 35px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
        }
        
        textarea.code-editor {
            flex: 1;
            background: #0d1117;
            border: none;
            color: #c9d1d9;
            padding: 15px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }
        
        /* Chat Panel */
        .chat-panel {
            width: 400px;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            background: #161b22;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .message.user {
            background: #1f6feb;
            color: white;
            margin-left: 20px;
        }
        
        .message.assistant {
            background: #21262d;
            border: 1px solid #30363d;
        }
        
        .chat-input {
            padding: 15px;
            border-top: 1px solid #30363d;
        }
        
        .chat-input textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            height: 80px;
        }
        
        .chat-input button {
            margin-top: 10px;
            width: 100%;
            background: #1f6feb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .chat-input button:hover { background: #388bfd; }
        
        /* Status Bar */
        .status-bar {
            height: 25px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 11px;
            color: #8b949e;
            gap: 20px;
        }
        
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }
        
        /* Auth Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            width: 400px;
        }
        
        .modal h2 { margin-bottom: 20px; color: #58a6ff; }
        
        .modal input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-family: inherit;
        }
        
        .modal button {
            width: 100%;
            background: #238636;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Auth Modal -->
    <div id="authModal" class="modal-overlay">
        <div class="modal">
            <h2>🔐 SUPREME IDE</h2>
            <p style="margin-bottom: 15px; color: #8b949e; font-size: 13px;">Enter your API token to continue</p>
            <input type="password" id="tokenInput" placeholder="Bearer token...">
            <button onclick="authenticate()">Connect</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">◈ SUPREME IDE</div>
        
        <div class="nav-section">
            <div class="nav-title">Workspace</div>
            <div class="nav-item active" onclick="switchTab('editor')">📄 Editor</div>
            <div class="nav-item" onclick="switchTab('projects')">📁 Projects</div>
            <div class="nav-item" onclick="switchTab('models')">🧠 Models</div>
        </div>
        
        <div class="nav-section project-list">
            <div class="nav-title">Recent Projects</div>
            <div id="projectList"></div>
        </div>
    </div>
    
    <!-- Main -->
    <div class="main">
        <!-- Toolbar -->
        <div class="toolbar">
            <button onclick="generateCode()">⚡ Generate Code</button>
            <button onclick="reviewCode()">🔍 Review</button>
            <button onclick="explainCode()">📖 Explain</button>
            <select class="model-select" id="modelSelect">
                <option value="auto">🎯 Auto-Select Model</option>
                <option value="llama-3.1-8b-instant">⚡ Llama 3.1 8B (Fast)</option>
                <option value="llama-3.3-70b-versatile">🔥 Llama 3.3 70B</option>
                <option value="moonshotai/kimi-k2-instruct">🧠 Kimi K2 (Large Context)</option>
                <option value="meta-llama/llama-4-scout-17b-16e-instruct">👑 Llama 4 Scout</option>
            </select>
        </div>
        
        <!-- Editor -->
        <div class="editor-container">
            <div class="code-panel">
                <div class="panel-header">main.py</div>
                <textarea class="code-editor" id="codeEditor" placeholder="# Write your code here or use the chat to generate..."></textarea>
            </div>
            
            <!-- Chat -->
            <div class="chat-panel">
                <div class="panel-header">💬 AI Assistant</div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <strong>Welcome to SUPREME IDE</strong><br>
                        I'm your AI coding assistant. I can help you write, review, and explain code. Just tell me what you need!
                    </div>
                </div>
                <div class="chat-input">
                    <textarea id="chatInput" placeholder="Ask me to write code, explain something, or review your code..."></textarea>
                    <button onclick="sendMessage()">Send Message</button>
                </div>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item"><div class="status-dot"></div>Connected</div>
            <div class="status-item" id="statusModel">Model: Auto</div>
            <div class="status-item" id="statusLatency"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://seo.bnrgreen.com';
        let token = localStorage.getItem('supreme_token') || '';
        
        // Check auth
        if (token) {
            document.getElementById('authModal').style.display = 'none';
        }
        
        function authenticate() {
            const input = document.getElementById('tokenInput').value;
            if (input) {
                token = input;
                localStorage.setItem('supreme_token', token);
                document.getElementById('authModal').style.display = 'none';
            }
        }
        
        async function apiRequest(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(`${API_URL}${endpoint}`, options);
            return response.json();
        }
        
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = content;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = 999999;
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            input.value = '';
            
            // Get code context
            const code = document.getElementById('codeEditor').value;
            const model = document.getElementById('modelSelect').value;
            
            try {
                const startTime = Date.now();
                const response = await apiRequest('/v1/responses', 'POST', {
                    input: message + (code ? `\n\nCurrent code:\n${code}` : ''),
                    model: model === 'auto' ? null : model,
                    max_output_tokens: 2048
                });
                
                const latency = Date.now() - startTime;
                document.getElementById('statusLatency').textContent = `${latency}ms`;
                
                if (response.response) {
                    // Check if response contains code
                    const codeMatch = response.response.match(/```[\w]*\n([\s\S]*?)```/);
                    if (codeMatch && confirm('Generated code detected. Insert into editor?')) {
                        document.getElementById('codeEditor').value = codeMatch[1];
                    }
                    addMessage('assistant', response.response.replace(/\n/g, '<br>'));
                    document.getElementById('statusModel').textContent = `Model: ${response.model || 'unknown'}`;
                }
            } catch (err) {
                addMessage('assistant', `<span style="color:#f85149">Error: ${err.message}</span>`);
            }
        }
        
        async function generateCode() {
            const prompt = prompt('What code would you like to generate?');
            if (!prompt) return;
            
            document.getElementById('chatInput').value = `Generate code: ${prompt}`;
            sendMessage();
        }
        
        async function reviewCode() {
            const code = document.getElementById('codeEditor').value;
            if (!code) {
                alert('No code to review!');
                return;
            }
            document.getElementById('chatInput').value = `Review this code for security and best practices:\n\n${code}`;
            sendMessage();
        }
        
        async function explainCode() {
            const code = document.getElementById('codeEditor').value;
            if (!code) {
                alert('No code to explain!');
                return;
            }
            document.getElementById('chatInput').value = `Explain this code:\n\n${code}`;
            sendMessage();
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        // Enter key in chat
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.metaKey) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
