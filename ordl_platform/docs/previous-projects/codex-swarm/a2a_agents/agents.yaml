# A2A Agent Configurations
# These agents can be started and connected to via the adapter system

agents:
  # Calculator Agent - Mathematical operations
  calculator:
    name: calculator-agent
    protocol: a2a
    url: http://localhost:8001
    streaming_enabled: true
    enabled: true
    description: "Performs mathematical calculations (add, subtract, multiply, divide)"
    
  # Echo Agent - Testing and debugging
  echo:
    name: echo-agent
    protocol: a2a
    url: http://localhost:8002
    streaming_enabled: true
    enabled: true
    description: "Echoes back messages with metadata"

  # Example external agent (not running locally)
  weather:
    name: weather-agent
    protocol: a2a
    url: https://weather-agent.example.com/a2a
    streaming_enabled: true
    enabled: false
    description: "Weather information service (example external agent)"
