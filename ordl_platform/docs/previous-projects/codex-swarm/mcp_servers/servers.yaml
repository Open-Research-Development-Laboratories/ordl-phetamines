# MCP Server Configurations
# These servers can be started and connected to via the adapter system

servers:
  # Filesystem Server - Access local files
  filesystem:
    name: filesystem
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/opt/codex-swarm"  # Allowed directory
    enabled: true
    description: "Access files in /opt/codex-swarm"

  # Fetch Server - Web requests
  fetch:
    name: fetch
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-fetch"
    enabled: true
    description: "Fetch web content"

  # SQLite Server - Database operations
  sqlite:
    name: sqlite
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-sqlite"
      - "/opt/codex-swarm/mcp_servers/data.db"
    enabled: true
    description: "SQLite database operations"

  # GitHub Server - GitHub API access
  github:
    name: github
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
    enabled: false  # Requires GITHUB_TOKEN
    description: "GitHub API access (requires token)"

  # Brave Search Server - Web search
  brave-search:
    name: brave-search
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-brave-search"
    env:
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    enabled: false  # Requires BRAVE_API_KEY
    description: "Brave web search (requires API key)"

  # Memory Server - Persistent storage
  memory:
    name: memory
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-memory"
    enabled: true
    description: "Knowledge graph memory"
