# =============================================================================
# ORDL COMMAND POST v6.0.0 - PYTEST CONFIGURATION
# =============================================================================
# Classification: TOP SECRET//SCI//NOFORN
# Purpose: Enterprise testing configuration with 100% coverage mandate
# =============================================================================

[pytest]
# Test Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async Support
asyncio_mode = auto

# Coverage Configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=command-post
    --cov=router
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html
    --cov-report=xml:tests/coverage.xml
    --cov-fail-under=100
    --no-cov-on-fail

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (module interactions)
    e2e: End-to-end tests (full system)
    security: Security-focused tests
    performance: Performance benchmarks
    slow: Tests that take >1 second
    gpu: Tests requiring GPU
    mcp: Tests requiring MCP servers

# Filter Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::RuntimeWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (prevent hanging tests)
timeout = 300

# Parallel Execution
# Use: pytest -n auto for parallel execution
