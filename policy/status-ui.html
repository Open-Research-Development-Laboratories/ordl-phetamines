<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Policy Status</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #bar { color: white; padding: 12px; border-radius: 8px; font-weight: 700; }
    .green { background:#198754; }
    .yellow { background:#b8860b; }
    .red { background:#b02a37; }
    button { margin-top: 12px; padding: 8px 12px; }
    pre { background:#f6f8fa; padding:12px; border-radius:8px; overflow:auto; }
  </style>
</head>
<body>
  <div id="bar" class="green">Loading...</div>
  <button id="re">Re-evaluate last blocked</button>
  <pre id="out"></pre>
  <script>
    async function load() {
      const r = await fetch('http://127.0.0.1:8789/status');
      const j = await r.json();
      const bar = document.getElementById('bar');
      bar.className = j.ui.color;
      bar.textContent = j.ui.banner + ' | ' + (j.last ? `${j.last.decision} ${j.last.ruleId}` : 'no events');
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    }
    load(); setInterval(load, 2000);

    document.getElementById('re').onclick = async () => {
      alert('Send POST /reevaluate with full event payload from blocked queue.');
    };
  </script>
</body>
</html>
